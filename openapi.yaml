openapi: 3.0.3
info:
  title: Educational Ticketing API
  version: "1.0.0"
  description: |
    REST API used as a teaching tool for mobile-app students. Authentication uses
    JWT bearer tokens issued at register/login and revoked on logout.
servers:
  - url: http://35.255.129.123:8080
    description: Local development

tags:
  - name: Health
  - name: Auth
  - name: Profile
  - name: Catalogue
  - name: Orders
  - name: Payments
  - name: Tickets

security: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NullEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/me:
    get:
      tags: [Profile]
      summary: Get current profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [Profile]
      summary: Update current profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

  /api/v1/categories:
    get:
      tags: [Catalogue]
      summary: List event categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListEnvelope"

  /api/v1/events:
    get:
      tags: [Catalogue]
      summary: List published events
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1, minimum: 1 }
        - in: query
          name: per_page
          schema: { type: integer, default: 10, minimum: 1, maximum: 50 }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: category_id
          schema: { type: integer, format: int64 }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: sort
          schema:
            type: string
            enum: [event_at_asc, event_at_desc, price_asc, price_desc]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListEnvelope"

  /api/v1/events/{id}:
    get:
      tags: [Catalogue]
      summary: Event detail (published only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetailEnvelope"
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/orders:
    post:
      tags: [Orders]
      summary: Create order (one ticket type per order)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderEnvelope"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }
    get:
      tags: [Orders]
      summary: List current user's orders
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1, minimum: 1 }
        - in: query
          name: per_page
          schema: { type: integer, default: 10, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/orders/{id}:
    get:
      tags: [Orders]
      summary: Order detail (owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/orders/{id}/cancel:
    post:
      tags: [Orders]
      summary: Cancel pending order (restores stock)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderEnvelope"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/orders/{id}/pay:
    post:
      tags: [Payments]
      summary: Simulate payment for pending order; generates tickets on success
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayOrderRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayOrderEnvelope"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Validation" }

  /api/v1/tickets:
    get:
      tags: [Tickets]
      summary: List current user's tickets
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/tickets/{id}:
    get:
      tags: [Tickets]
      summary: Ticket detail (owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetailEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Validation:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorEnvelope"

  schemas:
    HealthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status: { type: string, example: ok }
        message: { type: string, example: success }

    ErrorEnvelope:
      type: object
      properties:
        message: { type: string, example: resource not found }

    ValidationErrorEnvelope:
      type: object
      properties:
        message: { type: string, example: validation failed }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    NullEnvelope:
      type: object
      properties:
        data: { type: "null", nullable: true }
        message: { type: string }

    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        per_page: { type: integer }
        total: { type: integer, format: int64 }
        total_pages: { type: integer }

    User:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        email: { type: string, format: email }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    UserEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/User" }
        message: { type: string }

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, minLength: 2, maxLength: 100, example: Haris Oche }
        email: { type: string, format: email, example: haris@example.com }
        password: { type: string, minLength: 8, maxLength: 72, example: password123 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    UpdateProfileRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 2, maxLength: 100 }

    AuthResult:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer, example: 86400 }
        user: { $ref: "#/components/schemas/User" }

    AuthEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/AuthResult" }
        message: { type: string }

    CategoryDetail:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        slug: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CategoryListEnvelope:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/CategoryDetail" }
        message: { type: string }

    CategoryRef:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }

    VenueListRef:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        city: { type: string }

    VenueDetail:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        address: { type: string }
        city: { type: string }

    EventListItem:
      type: object
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        slug: { type: string }
        poster_url: { type: string, nullable: true }
        category: { $ref: "#/components/schemas/CategoryRef" }
        venue: { $ref: "#/components/schemas/VenueListRef" }
        event_at: { type: string, format: date-time }
        min_price: { type: number, format: double, nullable: true }
        is_available: { type: boolean }

    EventListEnvelope:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/EventListItem" }
        meta: { $ref: "#/components/schemas/PaginationMeta" }
        message: { type: string }

    TicketTypeDetail:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        price: { type: number, format: double }
        quota: { type: integer }
        sold_quantity: { type: integer }
        remaining_quantity: { type: integer }

    EventDetail:
      type: object
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        slug: { type: string }
        description: { type: string }
        poster_url: { type: string, nullable: true }
        category: { $ref: "#/components/schemas/CategoryRef" }
        venue: { $ref: "#/components/schemas/VenueDetail" }
        event_at: { type: string, format: date-time }
        sales_start_at: { type: string, format: date-time }
        sales_end_at: { type: string, format: date-time }
        status:
          type: string
          enum: [draft, published, cancelled, completed]
        ticket_types:
          type: array
          items: { $ref: "#/components/schemas/TicketTypeDetail" }

    EventDetailEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/EventDetail" }
        message: { type: string }

    CreateOrderRequest:
      type: object
      required: [ticket_type_id, quantity]
      properties:
        ticket_type_id: { type: integer, format: int64, example: 1 }
        quantity: { type: integer, minimum: 1, maximum: 10, example: 2 }

    OrderItem:
      type: object
      properties:
        id: { type: integer, format: int64 }
        ticket_type_id: { type: integer, format: int64 }
        ticket_type_name: { type: string }
        event_title: { type: string }
        quantity: { type: integer }
        price_per_ticket: { type: number, format: double }
        subtotal: { type: number, format: double }

    Order:
      type: object
      properties:
        id: { type: integer, format: int64 }
        order_code: { type: string, example: ORD-20260616-000001 }
        status:
          type: string
          enum: [pending, paid, cancelled, expired]
        total_amount: { type: number, format: double }
        expired_at: { type: string, format: date-time }
        paid_at: { type: string, format: date-time, nullable: true }
        cancelled_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        items:
          type: array
          items: { $ref: "#/components/schemas/OrderItem" }

    OrderEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Order" }
        message: { type: string }

    OrderListEnvelope:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Order" }
        meta: { $ref: "#/components/schemas/PaginationMeta" }
        message: { type: string }

    PayOrderRequest:
      type: object
      required: [payment_method]
      properties:
        payment_method:
          type: string
          enum: [bank_transfer, e_wallet, virtual_account]

    PayOrderResult:
      type: object
      properties:
        order_id: { type: integer, format: int64 }
        order_code: { type: string }
        payment_status: { type: string, enum: [success, failed] }
        order_status: { type: string, enum: [pending, paid, cancelled, expired] }
        payment_method: { type: string }
        payment_code: { type: string, example: PAY-20260616-000001 }
        amount: { type: number, format: double }
        paid_at: { type: string, format: date-time }
        generated_ticket_count: { type: integer }

    PayOrderEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/PayOrderResult" }
        message: { type: string }

    TicketEventSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        venue_name: { type: string }
        city: { type: string }
        event_at: { type: string, format: date-time }

    TicketListItem:
      type: object
      properties:
        id: { type: integer, format: int64 }
        ticket_code: { type: string, example: TIX-20260616-000001 }
        status: { type: string, enum: [active, used, cancelled] }
        event: { $ref: "#/components/schemas/TicketEventSummary" }

    TicketListEnvelope:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/TicketListItem" }
        message: { type: string }

    TicketHolder:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }

    TicketEventDetail:
      type: object
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        venue_name: { type: string }
        venue_address: { type: string }
        city: { type: string }
        event_at: { type: string, format: date-time }

    TicketTypeMini:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        price: { type: number, format: double }

    TicketDetail:
      type: object
      properties:
        id: { type: integer, format: int64 }
        ticket_code: { type: string }
        qr_code_value: { type: string, example: TIX-20260616-000001-7fd9b0c8 }
        status: { type: string, enum: [active, used, cancelled] }
        holder: { $ref: "#/components/schemas/TicketHolder" }
        event: { $ref: "#/components/schemas/TicketEventDetail" }
        ticket_type: { $ref: "#/components/schemas/TicketTypeMini" }

    TicketDetailEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/TicketDetail" }
        message: { type: string }
